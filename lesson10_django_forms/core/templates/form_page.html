{% extends "_layout.html" %}

{% block form_content %}
<h1>Register</h1>
<form class="col s12" method="post" action="{% url "postUser" %}">
    {% csrf_token %}
    <div class="row">
        <div class="input-field col s6">
            <input class="validate" type="text" name="name_field" id="name_field">
            <label for="name_field">Name</label>
        </div>
         <div class="input-field col s6">
            <input class="validate" type="text" name="name_field" id="name_field2">
            <label for="name_field2">Name2</label>
        </div>
    </div>
    <div class="row">
        <div class="input-field col s12">
            <input class="validate" type="text" name="surname_field" id="surname_field">
            <label for="surname_field">Surame</label>
        </div>
    </div>
    <button class="waves-effect waves-light btn indigo darken-4"><i class="material-icons left">login</i>Register</button>
</form>
{% endblock form_content %}
