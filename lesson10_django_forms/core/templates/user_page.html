{% extends "_layout.html" %}

{% block userPage %}
<div class="row">
    <div class="col s12">
      <div class="card blue-grey darken-1">
        <div class="card-content white-text">
            {% if error_message is None %}
                <span class="card-title">{{name}} {{surname}}</span>
            {% else %}
                <span class="card-title">{{error_message}}</span>
            {% endif %}
        </div>
      </div>
    </div>
  </div>
{% endblock userPage %}
